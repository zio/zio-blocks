name: Deploy Website Preview

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read
  deployments: write
  pull-requests: write
  statuses: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download Website Artifact
        uses: actions/download-artifact@v8
        with:
          name: website-artifact
          path: website-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download PR Metadata
        uses: actions/download-artifact@v8
        with:
          name: pr-metadata
          path: pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR Number
        id: pr
        run: echo "number=$(cat pr-metadata/pr-number.txt)" >> "$GITHUB_OUTPUT"

      - name: Deploy Preview to Netlify
        id: netlify-deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./website-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy preview from ${{ github.repository }} PR #${{ steps.pr.outputs.number }}"
          alias: "${{ github.event.repository.name }}-pr-${{ steps.pr.outputs.number }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Post Preview URL Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr.outputs.number }}
          header: netlify-preview
          message: |
            🚀 Preview deployed to Netlify: ${{ steps.netlify-deploy.outputs.deploy-url }}

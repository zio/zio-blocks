app: scala-examples

environments:
  local:
    server: local

includes:
- ../scala-js-template.yaml

components:
  scala:examples:
    templates: scala.js
    buildMergeMode: replace
    build:
    - command: bash -c 'COMP_DIR="$PWD" && cd ../.. && sbt -batch -no-colors -Dsbt.supershell=false "++3.8.2!" "project zioGolemExamples" "golemBuildComponent scala:examples $COMP_DIR/.golem/scala.js"'
      sources:
      - src
      targets:
      - .golem/scala.js
    - injectToPrebuiltQuickjs: .generated/agent_guest.wasm
      module: .golem/scala.js
      moduleWasm: .golem/agents/scala_examples.module.wasm
      into: .golem/agents/scala_examples.dynamic.wasm

httpApi:
  deployments:
    local:
    - domain: localhost:9006
      agents:
        WeatherAgent: {}
        InventoryAgent: {}
        CatalogAgent: {}
        WebhookDemo: {}
